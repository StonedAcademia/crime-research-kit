name: tc-c-kit

services:
  crk:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: tc-c-kit:local
    environment:
      CRK_CASES_ROOT: /app/data/cases
      CRK_MODEL: ${CRK_MODEL:-ollama:llama3.1}
      CRK_SEARXNG_URL: http://searxng:8080
      CRK_QDRANT_URL: http://qdrant:6333
      CRK_QDRANT_HOST: qdrant
      CRK_QDRANT_PORT: 6333
      OLLAMA_HOST: http://ollama:11434
      CRK_EMBED_MODEL: ${CRK_EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    depends_on:
      - searxng
      - qdrant
      - ollama
    networks:
      - crk-local
    volumes:
      - ${CRK_REPO_ROOT:-..}/data/cases:/app/data/cases
      - ${CRK_REPO_ROOT:-..}/data/exports:/app/data/exports
      - crk-hf-cache:/app/.cache/huggingface
    init: true

  searxng:
    image: docker.io/searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://127.0.0.1:8080/}
      FORCE_OWNERSHIP: "false"
    networks:
      - crk-local
    ports:
      - "127.0.0.1:${CRK_SEARXNG_HOST_PORT:-8080}:8080"
    volumes:
      - ${CRK_SEARXNG_SETTINGS_FILE:-../deployment/searxng/settings.yml}:/etc/searxng/settings.yml:ro
      - ${CRK_REPO_ROOT:-..}/deployment/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
      - searxng-cache:/var/cache/searxng
    depends_on:
      - searxng-valkey
    restart: unless-stopped

  searxng-valkey:
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    networks:
      - crk-local
    volumes:
      - searxng-valkey-data:/data
    restart: unless-stopped

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    networks:
      - crk-local
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: docker.io/ollama/ollama:latest
    networks:
      - crk-local
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

networks:
  crk-local:
    driver: bridge

volumes:
  crk-hf-cache:
  searxng-cache:
  searxng-valkey-data:
  qdrant-storage:
  ollama-models:
