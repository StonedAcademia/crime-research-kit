tasks:
  fetch-governance-tools:
    description: "Fetch pinned external governance binaries."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/tools/fetch_governance_tools.py"]
    inputs: ["deployment/tooling/manifest.json", "deployment/scripts/tools/fetch_governance_tools.py"]
    options: { cache: false, outputStyle: stream }
    preset: utility
    toolchains: system

  audit-secrets:
    description: "Run gitleaks against tracked and fixture content."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/tools/fetch_governance_tools.py", "run", "gitleaks", "detect", "--source", ".", "--config", ".gitleaks.toml", "--no-git", "--redact"]
    inputs: ["@group(python)", "@group(deployment)", "deployment/tooling/manifest.json", ".gitleaks.toml"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  audit-deps:
    description: "Run pip-audit with offline degradation."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/tools/fetch_governance_tools.py", "audit-deps"]
    inputs: ["pyproject.toml", "deployment/scripts/tools/fetch_governance_tools.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  audit-licenses:
    description: "List installed licenses for the governance policy lane."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/checks/license_policy.py"]
    inputs: ["pyproject.toml", "deployment/scripts/checks/license_policy.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  audit-links:
    description: "Run lychee external link checks."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/tools/fetch_governance_tools.py", "run", "lychee", "--no-progress", "README.md", "docs"]
    inputs: ["@group(docs)", "deployment/tooling/manifest.json", "deployment/scripts/tools/fetch_governance_tools.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  sbom:
    description: "Emit a CycloneDX SBOM for the installed environment."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/tools/fetch_governance_tools.py", "sbom"]
    inputs: ["pyproject.toml", "deployment/scripts/tools/fetch_governance_tools.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  build-dist:
    description: "Build sdist and wheel artifacts."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/checks/fresh_build.py"]
    inputs: ["@group(python)", "pyproject.toml", "README.md", "LICENSE", "deployment/scripts/checks/fresh_build.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system

  release-check:
    description: "Validate tag, changelog, reproducible build artifacts, and SBOMs."
    command: "uv"
    args: ["run", "--cache-dir", ".uv-cache", "--no-project", "--with-editable", ".[governance]", "--", "python", "deployment/scripts/checks/release/release_readiness.py"]
    inputs: ["@group(python)", "pyproject.toml", "README.md", "LICENSE", "CHANGELOG.md", "deployment/scripts/checks/release/release_readiness.py"]
    options: { cache: false, outputStyle: stream }
    toolchains: system
