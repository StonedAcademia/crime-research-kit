name: Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"
  push:
    paths:
      - pyproject.toml
      - deployment/tooling/manifest.json
      - deployment/scripts/tools/fetch_governance_tools.py
      - deployment/scripts/checks/license_policy.py
      - .gitleaks.toml
  pull_request:
    paths:
      - pyproject.toml
      - deployment/tooling/manifest.json
      - deployment/scripts/tools/fetch_governance_tools.py
      - deployment/scripts/checks/license_policy.py
      - .gitleaks.toml

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: moonrepo/setup-toolchain@v0
      - run: moon run crk:install-governance
      - run: moon run crk:audit-secrets crk:audit-deps crk:audit-licenses
      - run: moon run crk:audit-links
        continue-on-error: true
