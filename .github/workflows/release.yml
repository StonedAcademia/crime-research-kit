name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CRK_RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: moonrepo/setup-toolchain@v0
      - run: moon run crk:install-governance
      - run: moon run crk:test
      - run: moon run crk:build-dist
      - run: moon run crk:sbom
      - run: moon run crk:release-check
      - run: moon run crk:audit-secrets crk:audit-deps
